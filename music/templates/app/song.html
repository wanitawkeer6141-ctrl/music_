<!DOCTYPE html>
<html>
<head>
    <title>Music App</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            color: white;
            background: url("https://images.unsplash.com/photo-1511379938547-c1f69419868d") no-repeat center center/cover;
            background-attachment: fixed;
            min-height: 100vh;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.75);
            z-index: -1;
        }

        h1 {
            text-align: center;
            padding: 20px;
        }

        .container {
            display: flex;
            justify-content: center;
        }

        .alpha {
            width: 90%;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
        }

        .song-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(14px);
            border-radius: 16px;
            padding: 15px;
            text-align: center;

            opacity: 0;
            transform: translateY(80px) scale(0.9);
            transition: all 0.6s ease;

            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
        }

        .song-card.show {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        .song-card:hover {
            transform: rotateY(10deg) rotateX(8deg) scale(1.05);
        }

        .song-card img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            border-radius: 12px;
        }

        .audio-box {
            margin-top: 12px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 20px;
        }

        audio {
            width: 100%;
        }select{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:10px;
}

button{
    margin-top:10px;
    width:100%;
    padding:10px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

        
        .playing {
            border: 2px solid lime;
        }

        @media (max-width: 900px) {
            .alpha {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 600px) {
            .alpha {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

<h1>🎵 My Music</h1>

<div class="container">
    <div class="alpha">

        {% for s in songs %}
        <div class="song-card">
            <h3>{{ s.name }}</h3>

            {% if s.image %}
            <img src="{{ s.image.url }}">
            {% endif %}

            <h5>{{ s.artist }}</h5>
            <h5>{{ s.artist }}</h5>

<form method="POST" action="{% url 'add_song' %}">
    {% csrf_token %}

    <input type="hidden" name="song_id" value="{{ s.id }}">

    <select name="playlist_id" required>
        <option value="">Select Playlist</option>

        {% for p in playlists %}
            <option value="{{ p.id }}">
                {{ p.name }}
            </option>
        {% endfor %}
    </select>

    <button type="submit">
        Add to Playlist
    </button>
</form>

            <div class="audio-box">
                <audio class="player" controls {% if forloop.first %}id="main-player"{% endif %}>
                    <source src="{{ s.audio.url }}" type="audio/mpeg">
                </audio>
            </div>
        </div>
        {% endfor %}

    </div>
</div>

<script>
const players = document.querySelectorAll(".player");

const cards = document.querySelectorAll(".song-card");
function showOnScroll() {
    cards.forEach((card, index) => {
        const rect = card.getBoundingClientRect();
        if (rect.top < window.innerHeight - 100) {
            setTimeout(() => {
                card.classList.add("show");
            }, index * 100);
        }
    });
}
window.addEventListener("scroll", showOnScroll);
window.addEventListener("load", showOnScroll);


document.addEventListener("click", () => {
    const first = document.getElementById("main-player");
    if (first) first.play();
}, { once: true });


players.forEach((audio, index) => {
    audio.addEventListener("ended", () => {
        let next = players[index + 1];

        if (next) {
            next.play();
        } else {
            players[0].play(); //aylist
        }
    });

    audio.addEventListener("play", () => {
        players.forEach(a => a.closest(".song-card").classList.remove("playing"));
        audio.closest(".song-card").classList.add("playing");
    });
});
</script>

</body>
</html>
