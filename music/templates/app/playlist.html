<!DOCTYPE html>
<html>
<head>
    <title>Playlist</title>
</head>
<body>

    <h1>Create Playlist</h1>

    <form method="POST">
        {% csrf_token %}
        <input type="text" name="name" placeholder="Playlist name">
        <button type="submit">Create</button>
    </form>

   {% for p in playlists %}
    <h2>
        <a href="{% url 'playlist_detail' p.id %}">
            {{ p.name }}
        </a>
    </h2>
{% endfor %}
</body>
</html>
