<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOME</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            color: white;

            background: url("https://images.unsplash.com/photo-1511379938547-c1f69419868d") no-repeat center center/cover;
            background-attachment: fixed;
            min-height: 100vh;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .vip {
            display: flex;
            gap: 25px;
        }

       
        .vip a {
            position: relative;
            display: inline-block;
            text-decoration: none;
            color: white;
            font-size: 18px;
            padding: 15px 30px;
            border-radius: 12px;

            border: 2px solid #c9a86a;
            background: linear-gradient(145deg, #1c1c1c, #0d0d0d);

            transform: translateY(60px) scale(0.9);
            opacity: 0;

            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
            transition: all 0.5s ease;

            transform-style: preserve-3d;
            overflow: hidden;
        }

       
        .vip a.show {
            transform: translateY(0) scale(1);
            opacity: 1;
        }
        .vip a:hover {
            transform: rotateY(10deg) rotateX(10deg) scale(1.08);
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
            color: yellowgreen;
        }

        /* shine effect */
        .vip a::before {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(120deg, transparent, yellowgreen, transparent);
            transition: 0.5s;
        }

        .vip a:hover::before {
            left: 100%;
        }

        
        .vip a::after {
            content: " 🎵";
        }
    </style>
</head>

<body>

<div class="container">
    <div class="vip">
        <a href="{% url 'song' %}" class="musicBtn">Hindi Songs</a>
        <a href="{% url 'about' %}" class="musicBtn">About</a>
    </div>
</div>

<script>
window.addEventListener("load", () => {
    const buttons = document.querySelectorAll(".musicBtn");

    buttons.forEach((btn, index) => {
        setTimeout(() => {
            btn.classList.add("show");
        }, index * 300);
    });
});
</script>

</body>
</html>
